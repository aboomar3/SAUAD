<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسب - متتبع النفقات الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- جسيمات الخلفية -->
    <div class="particles"></div>
    
    <div class="container">
        <!-- الهيدر -->
        <header class="main-header">
            <div class="logo-icon">💰</div>
            <h1>حاسب</h1>
            <p class="subtitle">متتبع النفقات الذكي</p>
            <div class="header-stats">
                <span class="stat-badge">📅 <span id="current-date"></span></span>
                <span class="stat-badge">📋 <span id="header-count">0</span> معاملات</span>
            </div>
        </header>

        <!-- بطاقة الرصيد -->
        <div class="balance-card glass-card">
            <div class="balance-header">
                <h2>💰 الرصيد الحالي</h2>
                <button class="refresh-btn" onclick="updateUI()" title="تحديث">🔄</button>
            </div>
            <p id="total-balance" class="balance-amount">0.00</p>
            <p class="currency">ريال</p>
            
            <div class="income-expense">
                <div class="income-box">
                    <div class="icon-circle green">📈</div>
                    <p>الدخل</p>
                    <p id="total-income" class="money plus">+0.00</p>
                </div>
                <div class="divider"></div>
                <div class="expense-box">
                    <div class="icon-circle red">📉</div>
                    <p>المصروفات</p>
                    <p id="total-expense" class="money minus">-0.00</p>
                </div>
            </div>
            
            <div class="stats-details">
                <div class="stat-item">
                    <span class="stat-icon">📦</span>
                    <span>الكميات: <strong id="total-quantity">0</strong></span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📊</span>
                    <span>المعاملات: <strong id="transaction-count">0</strong></span>
                </div>
            </div>
        </div>

        <!-- نموذج الإضافة -->
        <div class="transaction-form glass-card">
            <h2>➕ إضافة معاملة جديدة</h2>
            <form id="transaction-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>الوصف</label>
                        <input type="text" id="description" placeholder="مثال: راتب شهري، فاتورة كهرباء..." required>
                    </div>
                    <div class="form-group">
                        <label>الكمية</label>
                        <input type="number" id="quantity" placeholder="عدد العناصر" min="1" value="1" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>المبلغ الإجمالي</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>سعر الوحدة</label>
                        <input type="text" id="unit-price" placeholder="يحسب تلقائياً" readonly>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>الفئة</label>
                        <select id="category" required>
                            <option value="">اختر الفئة...</option>
                            <option value="salary">💼 راتب</option>
                            <option value="food">🍔 طعام</option>
                            <option value="transport">🚗 مواصلات</option>
                            <option value="utilities">💡 فواتير</option>
                            <option value="shopping">🛍️ تسوق</option>
                            <option value="health">🏥 صحة</option>
                            <option value="entertainment">🎮 ترفيه</option>
                            <option value="other">📦 أخرى</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>التاريخ</label>
                        <input type="date" id="date" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <span class="btn-text">إضافة المعاملة</span>
                    <span class="btn-icon">✨</span>
                </button>
            </form>
        </div>

        <!-- أدوات التصفية -->
        <div class="filter-section glass-card">
            <div class="filter-row">
                <div class="filter-group">
                    <label>🔍 تصفية حسب الفئة</label>
                    <select id="filter-category">
                        <option value="all">📋 جميع الفئات</option>
                        <option value="salary">💼 راتب</option>
                        <option value="food">🍔 طعام</option>
                        <option value="transport">🚗 مواصلات</option>
                        <option value="utilities">💡 فواتير</option>
                        <option value="shopping">🛍️ تسوق</option>
                        <option value="health">🏥 صحة</option>
                        <option value="entertainment">🎮 ترفيه</option>
                        <option value="other">📦 أخرى</option>
                    </select>
                </div>
                <div class="action-buttons">
                    <button id="export-btn" class="btn btn-success">
                        📥 تصدير CSV
                    </button>
                    <button id="send-report-btn" class="btn btn-info">
                        📧 تقرير للإيميل
                    </button>
                </div>
            </div>
        </div>

        <!-- قائمة المعاملات -->
        <div class="transactions-list glass-card">
            <div class="list-header">
                <h2>📋 سجل المعاملات</h2>
                <div class="list-summary">
                    <span>المجموع: <strong id="filtered-total">0.00</strong></span>
                    <span>القطع: <strong id="filtered-quantity">0</strong></span>
                </div>
            </div>
            <ul id="transaction-list"></ul>
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">📭</div>
                <p>لا توجد معاملات حتى الآن</p>
                <p class="empty-hint">أضف معاملتك الأولى أعلاه</p>
            </div>
        </div>
    </div>

    <!-- تنبيه النجاح -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
